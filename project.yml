name: WCS-Insight

options:
  bundleIdPrefix: org.worldclassscholars
  deploymentTarget:
    iOS: "17.0"

packages:
  WCSCore:
    path: Packages/WCSCore

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  MemoryAtlas:
    type: application
    platform: iOS
    sources:
      - path: Apps/MemoryAtlas
        excludes:
          - README.md
    dependencies:
      - package: WCSCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.worldclassscholars.memoryatlas
        INFOPLIST_KEY_CFBundleDisplayName: Memory Atlas
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"

  MemoryAtlasUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Apps/MemoryAtlasUITests
    dependencies:
      - target: MemoryAtlas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.worldclassscholars.memoryatlas.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MemoryAtlas:
    build:
      targets:
        MemoryAtlas: all
    test:
      targets:
        - MemoryAtlasUITests
