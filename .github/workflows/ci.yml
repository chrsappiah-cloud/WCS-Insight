name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  swift-package:
    name: WCSCore Swift package
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Test WCSCore
        run: swift test --package-path Packages/WCSCore

  ios-simulator:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Install dependencies
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: Pick available iOS simulator
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import subprocess
          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          for devices in data["devices"].values():
              for device in devices:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      print(f"SIMULATOR_NAME={device['name']}")
                      print(f"SIMULATOR_UDID={device['udid']}")
                      raise SystemExit(0)
          raise SystemExit("No iPhone simulator available")
          PY
          echo "Using simulator: $SIMULATOR_NAME ($SIMULATOR_UDID)"
      - name: Test Memory Atlas in simulator
        env:
          WCS_SIMULATOR_SCREENSHOT_PATH: ${{ github.workspace }}/artifacts/memory-atlas-simulator.png
        run: |
          mkdir -p artifacts
          xcodebuild test             -project WCS-Insight.xcodeproj             -scheme MemoryAtlas             -destination "id=$SIMULATOR_UDID"             CODE_SIGN_IDENTITY=""             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO
      - name: Upload simulator screenshot
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: memory-atlas-simulator
          path: artifacts/memory-atlas-simulator.png
          if-no-files-found: error
