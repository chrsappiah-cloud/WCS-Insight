name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-16
    env:
      PROJECT_NAME: WCS-Insight
      SCHEME_NAME: WCS-Insight

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve project type
        run: |
          if [ -d "$PROJECT_NAME.xcworkspace" ]; then
            echo "XCODE_CONTAINER=-workspace $PROJECT_NAME.xcworkspace" >> "$GITHUB_ENV"
          else
            echo "XCODE_CONTAINER=-project $PROJECT_NAME.xcodeproj" >> "$GITHUB_ENV"
          fi

      - name: Pick available iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $1; exit}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$DEVICE" ]; then
            echo "No iPhone simulator available" >&2
            exit 1
          fi
          echo "SIMULATOR_NAME=$DEVICE" >> "$GITHUB_ENV"
          echo "Using simulator: $DEVICE"

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            $XCODE_CONTAINER \
            -scheme "$SCHEME_NAME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -test-iterations 3 \
            -retry-tests-on-failure \
            -resultBundlePath TestResults \
            | xcpretty

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
