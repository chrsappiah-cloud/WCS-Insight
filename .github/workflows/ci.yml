name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  swift-package:
    name: WCSCore Swift package
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Test WCSCore
        run: swift test --package-path Packages/WCSCore

  ios-simulator:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Install dependencies
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: Pick available iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $1; exit}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$DEVICE" ]; then echo "No iPhone simulator available" >&2; exit 1; fi
          echo "SIMULATOR_NAME=$DEVICE" >> "$GITHUB_ENV"
          echo "Using simulator: $DEVICE"
      - name: Test Memory Atlas in simulator
        run: |
          mkdir -p artifacts
          (
            sleep 60
            for attempt in {1..18}; do
              xcrun simctl io booted screenshot artifacts/memory-atlas-simulator.png || true
              sleep 8
            done
          ) &
          SCREENSHOT_PID=$!
          set +e
          xcodebuild test             -project WCS-Insight.xcodeproj             -scheme MemoryAtlas             -destination "platform=iOS Simulator,name=$SIMULATOR_NAME"             CODE_SIGN_IDENTITY=""             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO
          TEST_STATUS=$?
          wait "$SCREENSHOT_PID" || true
          if [ -f artifacts/memory-atlas-simulator.png ]; then
            echo "SIMULATOR_SCREENSHOT_BASE64_BEGIN"
            base64 -i artifacts/memory-atlas-simulator.png
            echo "SIMULATOR_SCREENSHOT_BASE64_END"
          fi
          exit "$TEST_STATUS"
      - name: Upload simulator screenshot
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: memory-atlas-simulator
          path: artifacts/memory-atlas-simulator.png
          if-no-files-found: error
