name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-15
    env:
      PROJECT_NAME: WCS-Insight
      SCHEME_NAME: WCS-Insight
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode project exists
        run: |
          if [ ! -d "$PROJECT_NAME.xcodeproj" ] && [ ! -d "$PROJECT_NAME.xcworkspace" ]; then
            echo "::notice::Upload/push the Xcode source for $PROJECT_NAME to activate full CI."
            exit 0
          fi

      - name: Resolve project type
        run: |
          if [ -d "$PROJECT_NAME.xcworkspace" ]; then
            echo "XCODE_CONTAINER=-workspace $PROJECT_NAME.xcworkspace" >> "$GITHUB_ENV"
          else
            echo "XCODE_CONTAINER=-project $PROJECT_NAME.xcodeproj" >> "$GITHUB_ENV"
          fi

      - name: Pick available iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $1; exit}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$DEVICE" ]; then
            echo "No iPhone simulator available" >&2
            exit 1
          fi
          echo "SIMULATOR_NAME=$DEVICE" >> "$GITHUB_ENV"
          echo "Using simulator: $DEVICE"

      - name: Build
        run: |
          xcodebuild clean build             $XCODE_CONTAINER             -scheme "$SCHEME_NAME"             -destination "generic/platform=iOS"             CODE_SIGN_IDENTITY=""             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test             $XCODE_CONTAINER             -scheme "$SCHEME_NAME"             -destination "platform=iOS Simulator,name=$SIMULATOR_NAME"             CODE_SIGN_IDENTITY=""             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO
