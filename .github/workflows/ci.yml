name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  swift-package:
    name: WCSCore Swift package
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Test WCSCore
        run: swift test --package-path Packages/WCSCore

  xcode-build:
    name: Build and Test
    runs-on: macos-15
    env:
      PROJECT_NAME: WCS-Insight
      SCHEME_NAME: WCS-Insight
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Xcode project
        run: |
          if [ -d "$PROJECT_NAME.xcodeproj" ]; then
            echo "HAS_XCODE_PROJECT=true" >> "$GITHUB_ENV"
          else
            echo "HAS_XCODE_PROJECT=false" >> "$GITHUB_ENV"
            echo "::notice::No root Xcode project yet. Package tests validate the implementation scaffold."
          fi
      - name: Select Xcode
        if: env.HAS_XCODE_PROJECT == 'true'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Resolve project type
        if: env.HAS_XCODE_PROJECT == 'true'
        run: |
          if [ -d "$PROJECT_NAME.xcworkspace" ]; then
            echo "XCODE_CONTAINER=-workspace $PROJECT_NAME.xcworkspace" >> "$GITHUB_ENV"
          else
            echo "XCODE_CONTAINER=-project $PROJECT_NAME.xcodeproj" >> "$GITHUB_ENV"
          fi
      - name: Pick available iOS simulator
        if: env.HAS_XCODE_PROJECT == 'true'
        run: |
          DEVICE=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $1; exit}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$DEVICE" ]; then echo "No iPhone simulator available" >&2; exit 1; fi
          echo "SIMULATOR_NAME=$DEVICE" >> "$GITHUB_ENV"
      - name: Build
        if: env.HAS_XCODE_PROJECT == 'true'
        run: |
          xcodebuild clean build $XCODE_CONTAINER -scheme "$SCHEME_NAME" -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Test
        if: env.HAS_XCODE_PROJECT == 'true'
        run: |
          xcodebuild test $XCODE_CONTAINER -scheme "$SCHEME_NAME" -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
